codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "100...100"
  status:
    project:
      default:
        target: 100%
        threshold: 0%
    patch:
      default:
        target: 100%
        threshold: 0%

comment:
  layout: "reach,diff,flags,files"

flags:
  backend:
    paths:
      - backend/
  frontend:
    paths:
      - frontend/webcoder_ui/

component_management:
  default_rules:
    statuses:
      - type: project
        target: 100%
        threshold: 0%
  individual_components:
    - component_id: backend
      name: backend
      paths:
        - backend/
    - component_id: frontend
      name: frontend
      paths:
        - frontend/webcoder_ui/

bundle_analysis:
  warning_threshold: "0%"
  status: informational
